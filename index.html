function patch() {
  // Replace portal card icons by finding card by h3 text
  var cards = document.querySelectorAll('.portal-card');
  cards.forEach(function(card) {
    var h3 = card.querySelector('h3');
    var icon = card.querySelector('.portal-icon');
    if (!h3 || !icon || icon.dataset.replaced) return;
    var h3text = h3.textContent || '';
    if (h3text.indexOf('Pemerintah Kota') >= 0) {
      icon.dataset.replaced = '1';
      icon.innerHTML = '<img src="' + MJK + '" style="width:80px;height:80px;object-fit:contain;display:block;margin:0 auto;" alt="Logo Kota Mojokerto">';
    }
    if (h3text.indexOf('BGN') >= 0) {
      icon.dataset.replaced = '1';
      icon.innerHTML = '<img src="' + BGN + '" style="width:80px;height:80px;object-fit:contain;display:block;margin:0 auto;border-radius:50%;" alt="Logo BGN">';
    }
  });

  // Modal headers
  var modals = document.querySelectorAll('.modal');
  modals.forEach(function(modal) {
    if (modal.dataset.patched) return;
    var h2 = modal.querySelector('h2');
    if (!h2) return;
    var text = h2.textContent || '';
    var src = null, st = '', rl = '', rd = '';
    if (text.indexOf('Pemerintah Kota') >= 0) {
      src = MJK; st = ''; rl = 'PEMERINTAH KOTA MOJOKERTO'; rd = 'Verifikator Laporan MBG';
    } else if (text.indexOf('BGN') >= 0) {
      src = BGN; st = 'border-radius:50%;'; rl = 'BADAN GIZI NASIONAL'; rd = 'Republik Indonesia — Kota Mojokerto';
    }
    if (!src) return;
    modal.dataset.patched = '1';
    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);';
    var img = document.createElement('img');
    img.src = src; img.style.cssText = 'width:52px;height:52px;object-fit:contain;flex-shrink:0;' + st;
    var info = document.createElement('div');
    info.innerHTML = '<div style="font-size:.65rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.1rem">' + rl + '</div><div style="font-size:.78rem;color:var(--muted)">' + rd + '</div>';
    wrap.appendChild(img); wrap.appendChild(info);
    h2.parentNode.insertBefore(wrap, h2);
  });

  // Sidebar logo
  var sl = document.querySelector('.sidebar-logo');
  if (sl && !sl.dataset.patched) {
    var sr = document.querySelector('.su-role');
    if (sr) {
      var rt = sr.textContent || '';
      var src2 = rt.indexOf('Pemerintah') >= 0 ? MJK : rt.indexOf('BGN') >= 0 ? BGN : null;
      var st2 = rt.indexOf('BGN') >= 0 ? 'border-radius:50%;' : 'border-radius:4px;';
      if (src2) {
        sl.dataset.patched = '1';
        var img2 = document.createElement('img');
        img2.src = src2;
        img2.style.cssText = 'width:30px;height:30px;object-fit:contain;margin-left:auto;background:#fff;padding:2px;flex-shrink:0;' + st2;
        sl.appendChild(img2);
      }
    }
  }

  // Welcome banners
  var banners = document.querySelectorAll('.welcome-banner');
  banners.forEach(function(b) {
    if (b.dataset.patched) return;
    var h2 = b.querySelector('h2');
    if (!h2) return;
    var t = h2.textContent || '';
    var src3 = null, st3 = '', rl3 = '', rd3 = '';
    if (t.indexOf('Pemkot') >= 0 || t.indexOf('Dashboard') >= 0) {
      src3 = MJK; st3 = 'border-radius:8px;background:rgba(255,255,255,.15);padding:3px;';
      rl3 = 'PEMERINTAH KOTA MOJOKERTO'; rd3 = 'Dinas Pengawasan MBG';
    } else if (t.indexOf('BGN') >= 0 || t.indexOf('Control Center') >= 0) {
      src3 = BGN; st3 = 'border-radius:50%;background:rgba(255,255,255,.12);';
      rl3 = 'BADAN GIZI NASIONAL'; rd3 = 'Republik Indonesia — Kota Mojokerto';
    }
    if (!src3) return;
    b.dataset.patched = '1';
    var w = document.createElement('div');
    w.style.cssText = 'display:flex;align-items:center;gap:.85rem;margin-bottom:.85rem;';
    var img3 = document.createElement('img');
    img3.src = src3; img3.style.cssText = 'width:50px;height:50px;object-fit:contain;flex-shrink:0;' + st3;
    var inf = document.createElement('div');
    inf.innerHTML = '<div style="font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:.1rem">' + rl3 + '</div><div style="font-size:.78rem;color:rgba(255,255,255,.75)">' + rd3 + '</div>';
    w.appendChild(img3); w.appendChild(inf);
    b.insertBefore(w, b.firstChild);
  });

  // Page header badges
  var ph2s = document.querySelectorAll('.page-header h2');
  ph2s.forEach(function(h2) {
    if (h2.dataset.patched) return;
    var suRole = document.querySelector('.su-role');
    if (!suRole) return;
    var rt = suRole.textContent || '';
    var ht = h2.textContent || '';
    var isPemkot = rt.indexOf('Pemerintah') >= 0;
    var isBGN = rt.indexOf('BGN') >= 0;
    if (!isPemkot && !isBGN) return;
    var color = isPemkot ? '#1e40af' : '#166534';
    var bg = isPemkot ? '#dbeafe' : '#dcfce7';
    var border = isPemkot ? '#93c5fd' : '#86efac';
    var label = isPemkot ? 'Pemkot' : 'BGN';
    var descs = {
      'SPPG': isPemkot ? 'Memantau kinerja & kepatuhan SPPG untuk verifikasi laporan warga' : 'Mengelola operasional, sertifikasi & pelaporan nasional 18 SPPG',
      'Semua Laporan': isPemkot ? 'Tindaklanjut, verifikasi, dan penanganan laporan masyarakat' : 'Rekap data untuk pelaporan ke Badan Gizi Nasional Pusat',
      'Blockchain': isPemkot ? 'Validasi integritas & keaslian laporan masyarakat' : 'Ledger nasional — rekam jejak tidak dapat diubah'
    };
    var matched = false;
    Object.keys(descs).forEach(function(key) {
      if (ht.indexOf(key) >= 0 && !matched) {
        matched = true;
        h2.dataset.patched = '1';
        var badge = document.createElement('span');
        badge.style.cssText = 'display:inline-flex;align-items:center;background:' + bg + ';color:' + color + ';border:1px solid ' + border + ';border-radius:100px;padding:.15rem .65rem;font-size:.68rem;font-weight:700;margin-left:.6rem;vertical-align:middle;';
        badge.textContent = label;
        h2.appendChild(badge);
        var sub = h2.closest('.page-header') && h2.closest('.page-header').querySelector('p');
        if (sub) sub.textContent = descs[key];
      }
    });
  });
}

var obs = new MutationObserver(patch);
obs.observe(document.body, {childList:true, subtree:true});
[200, 600, 1200, 2500].forEach(function(t) { setTimeout(patch, t); });
})();
</script>
